# Standalone compose for GitHub-hosted runners: same build contexts/images as
# docker-compose.yml but with NO GPU reservations and NO X11/GUI, running
# headless with software rendering. Use it on its own (not as an override -- an
# override cannot delete the base file's `deploy.resources...devices: [nvidia]`,
# which would fail `up` on a runner with no nvidia runtime):
#
#   docker compose -f docker-compose.ci.yml up -d --build
#
# The camera renders via software llvmpipe (blank/slow), which is fine for the
# env-contract smoke: physics, EKF and MAVROS do not need the GPU.
services:
  px4-gazebo:
    build:
      context: ../..
      dockerfile: ros_gazebo_bridge/docker/Dockerfile.px4_gazebo
    container_name: star_nav_px4_gazebo
    network_mode: host
    environment:
      - PX4_GZ_WORLD=${PX4_GZ_WORLD:?Set PX4_GZ_WORLD to a .sdf generated by world_gen.py}
      - PX4_SIM_MODEL=${PX4_SIM_MODEL:-fpv5}
      - PX4_GZ_MODEL_POSE=${PX4_GZ_MODEL_POSE:-1,24,0.3,0,0,0}
      - HEADLESS=1
    volumes:
      - ../worlds:/worlds:ro

  ros-bridge:
    build:
      context: ../..
      dockerfile: ros_gazebo_bridge/docker/Dockerfile.ros_bridge
    container_name: star_nav_ros_bridge
    network_mode: host
    depends_on:
      - px4-gazebo
    volumes:
      - ../../checkpoints:/workspace/checkpoints
      - ../../logs:/workspace/logs
    command: ["bridge"]

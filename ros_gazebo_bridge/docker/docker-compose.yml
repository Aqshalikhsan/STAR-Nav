# Native Linux host. `network_mode: host` keeps MAVLink/ROS 2 DDS traffic off
# a container network boundary (the usual PX4-SITL + ROS 2 setup). On
# Windows/Mac run inside WSL2/a Linux VM -- but note the GPU/camera rendering
# only works on a real Linux GPU (see README: WSLg falls back to software and
# the live camera renders blank).
#
# The `deploy.resources...devices` + NVIDIA_* env below give the containers
# the host GPU (needs the NVIDIA Container Toolkit -- setup_linux.sh installs
# it). CPU-only machine? Delete those two blocks per service; the sim still
# flies, only the camera falls back to (blank/slow) software rendering.
#
# Quick start (see setup_linux.sh for the full walkthrough):
#   xhost +local:docker
#   python3 -m ros_gazebo_bridge.world_gen --scenario A --out worlds/scenario_a
#   PX4_GZ_WORLD=$(pwd)/worlds/scenario_a.sdf PX4_SIM_MODEL=fpv5 \
#     PX4_GZ_MODEL_POSE="1,24,0.3,0,0,0" HEADLESS=0 \
#     docker compose -f docker/docker-compose.yml up -d px4-gazebo ros-bridge

services:
  px4-gazebo:
    build:
      context: ../..
      dockerfile: ros_gazebo_bridge/docker/Dockerfile.px4_gazebo
    container_name: star_nav_px4_gazebo
    network_mode: host
    environment:
      - PX4_GZ_WORLD=${PX4_GZ_WORLD:?Set PX4_GZ_WORLD to a .sdf generated by world_gen.py}
      - PX4_SIM_MODEL=${PX4_SIM_MODEL:-fpv5}
      - PX4_GZ_MODEL_POSE=${PX4_GZ_MODEL_POSE:-1,24,0.3,0,0,0}
      - HEADLESS=${HEADLESS:-0}
      # GPU rendering (Gazebo camera) + GUI:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=all
      - DISPLAY=${DISPLAY:-:0}
      # Hybrid-graphics (Optimus) hosts: the X server's default GPU is the
      # Intel iGPU, so GLX/DRI3 windowed rendering fails against the NVIDIA
      # runtime unless PRIME render offload is explicitly requested (verified
      # on host via `__NV_PRIME_RENDER_OFFLOAD=1 __GLX_VENDOR_LIBRARY_NAME=nvidia
      # glxinfo` switching the renderer string from Intel to the NVIDIA GPU).
      - __NV_PRIME_RENDER_OFFLOAD=1
      - __GLX_VENDOR_LIBRARY_NAME=nvidia
    volumes:
      - ../worlds:/worlds:ro
      - /tmp/.X11-unix:/tmp/.X11-unix:rw       # Gazebo GUI on the host X server
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  ros-bridge:
    build:
      context: ../..
      dockerfile: ros_gazebo_bridge/docker/Dockerfile.ros_bridge
    container_name: star_nav_ros_bridge
    network_mode: host
    depends_on:
      - px4-gazebo
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=all
      - DISPLAY=${DISPLAY:-:0}
    volumes:
      - ../../checkpoints:/workspace/checkpoints
      - ../../logs:/workspace/logs
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
    command: ["bridge"]
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
